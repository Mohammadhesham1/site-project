<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#080808"/>
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Cinema Eldon"/>
<title>Cinema Eldon</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#080808;color:#f0f0f0;font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;}
.hide-scrollbar::-webkit-scrollbar{display:none;}
.hide-scrollbar{scrollbar-width:none;-ms-overflow-style:none;}
#loading{position:fixed;inset:0;background:#080808;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:20px;z-index:9999;transition:opacity .4s;}
#loading .logo{width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,#c9a84c,#8a6a20);
  display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(201,168,76,.4);
  animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes popIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk{background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%);
  background-size:400% 100%;animation:sk 1.5s infinite;}

/* ── PLAYER MODAL ── */
#modal{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;padding:1rem;overflow-y:auto;}
#modal.open{display:flex;}
.modal-box{width:100%;max-width:960px;background:#0e0e0e;border-radius:14px;overflow:hidden;
  animation:popIn .28s ease;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.9);}
.modal-close{position:absolute;top:12px;right:12px;z-index:30;background:rgba(0,0,0,.75);
  border:1px solid rgba(255,255,255,.12);color:#fff;width:36px;height:36px;border-radius:50%;
  cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.modal-close:hover{background:rgba(201,168,76,.8);}

/* ── PLAYER ── */
.player-wrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden;}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;}
/* Overlay is pointer-events:none — iframe gets ALL clicks */
#ply_overlay{position:absolute;inset:0;z-index:5;pointer-events:none;}
#ply_flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  width:72px;height:72px;border-radius:50%;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;pointer-events:none;}
#ply_flash.fire{animation:plyPop .52s cubic-bezier(.25,.46,.45,.94) forwards;}
@keyframes plyPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  40%{transform:translate(-50%,-50%) scale(1.15);opacity:.9;}
  100%{transform:translate(-50%,-50%) scale(1.7);opacity:0;}}
.ply-skip{position:absolute;top:0;bottom:0;width:30%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;pointer-events:none;opacity:0;border-radius:100vw;}
#ply_skip_L{left:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.2),transparent 70%);}
#ply_skip_R{right:0;background:radial-gradient(ellipse at 80% 50%,rgba(201,168,76,.2),transparent 70%);}
.ply-skip.fire{animation:skipRipple .72s ease forwards;}
@keyframes skipRipple{0%{opacity:0;}20%{opacity:1;}75%{opacity:1;}100%{opacity:0;}}
.ply-skip svg{filter:drop-shadow(0 0 6px rgba(201,168,76,.9));}
.ply-skip span{color:#fff;font-size:.72rem;font-family:'Cairo',sans-serif;font-weight:700;text-shadow:0 1px 6px rgba(0,0,0,.9);}

/* TV nav */
#tv_nav{display:none;align-items:center;justify-content:space-between;padding:10px 22px 0;}
.tv-nav-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f0f0f0;
  border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.8rem;
  transition:all .2s;display:flex;align-items:center;gap:6px;}
.tv-nav-btn:hover{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.35);color:#c9a84c;}
.tv-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
#tv_ep_label{color:#888;font-size:.82rem;font-family:'Cairo',sans-serif;}
.modal-body{padding:16px 22px 22px;}
.modal-title{font-size:1.3rem;font-weight:900;margin-bottom:8px;color:#fff;}
.modal-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.82rem;color:#555;align-items:center;}
.modal-rating{color:#c9a84c;font-weight:700;}
.modal-gpill{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);
  color:#c9a84c;font-size:.72rem;padding:2px 9px;border-radius:4px;}

/* ── DETAILS MODAL ── */
#details_modal{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.96);backdrop-filter:blur(18px);
  display:none;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;}
#details_modal.open{display:flex;}
.det-box{width:100%;max-width:920px;background:#111;border-radius:16px;overflow:hidden;
  animation:slideUp .32s ease;position:relative;margin:auto;box-shadow:0 40px 100px rgba(0,0,0,.9);}
.det-back-wrap{width:100%;aspect-ratio:21/7;position:relative;overflow:hidden;}
.det-back-wrap img{width:100%;height:100%;object-fit:cover;filter:brightness(.5);}
.det-back-grad{position:absolute;inset:0;background:linear-gradient(to top,#111 0%,rgba(17,17,17,.55) 45%,transparent 100%);}
.det-close{position:absolute;top:14px;right:14px;z-index:30;background:rgba(0,0,0,.72);
  border:1px solid rgba(255,255,255,.12);color:#fff;width:36px;height:36px;border-radius:50%;
  cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.det-close:hover{background:rgba(201,168,76,.8);}
.det-body{display:flex;gap:22px;padding:0 26px 24px;position:relative;}
.det-poster{flex-shrink:0;width:130px;margin-top:-60px;position:relative;z-index:5;
  border-radius:10px;overflow:hidden;box-shadow:0 14px 44px rgba(0,0,0,.75);}
.det-poster img{width:100%;display:block;}
.det-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#1a1200,#0a0800);
  display:flex;align-items:center;justify-content:center;}
.det-info{flex:1;min-width:0;padding-top:12px;}
.det-title{font-size:1.45rem;font-weight:900;color:#fff;margin-bottom:10px;line-height:1.25;}
.det-meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.det-rating{color:#c9a84c;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:4px;}
.det-year{color:#555;font-size:.84rem;display:flex;align-items:center;gap:4px;}
.det-pill{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);
  color:#c9a84c;font-size:.71rem;padding:2px 9px;border-radius:4px;}
.det-overview{color:rgba(255,255,255,.5);font-size:.88rem;line-height:1.75;margin-bottom:22px;}
.det-btn{display:inline-flex;align-items:center;gap:10px;background:#c9a84c;border:none;
  border-radius:10px;color:#000;cursor:pointer;padding:12px 28px;font-family:'Cairo',sans-serif;
  font-size:.95rem;font-weight:700;box-shadow:0 8px 24px rgba(201,168,76,.38);transition:transform .2s,box-shadow .2s;}
.det-btn:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(201,168,76,.52);}

/* seasons */
.det-seasons{padding:0 26px 10px;border-top:1px solid rgba(255,255,255,.05);}
.det-lbl{color:#444;font-size:.74rem;letter-spacing:.07em;text-transform:uppercase;margin:16px 0 10px;}
.season-pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;}
.season-pills::-webkit-scrollbar{display:none;}
.season-pill{flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#888;border-radius:8px;padding:6px 16px;cursor:pointer;font-family:'Cairo',sans-serif;
  font-size:.8rem;transition:all .2s;}
.season-pill.active,.season-pill:hover{background:rgba(201,168,76,.15);
  border-color:rgba(201,168,76,.4);color:#c9a84c;}
.det-episodes{padding:0 26px 24px;}
.ep-grid{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
.ep-grid::-webkit-scrollbar{display:none;}
.ep-item{flex-shrink:0;width:200px;cursor:pointer;border-radius:8px;overflow:hidden;
  background:#1a1a1a;transition:transform .2s,box-shadow .2s;position:relative;}
.ep-item:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.6);}
.ep-thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:#0a0800;}
.ep-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.ep-item:hover .ep-thumb img{transform:scale(1.06);}
.ep-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.ep-play-over{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.06);transition:background .2s;}
.ep-item:hover .ep-play-over{background:rgba(0,0,0,.5);}
.ep-play-c{width:38px;height:38px;border-radius:50%;background:rgba(201,168,76,.9);
  display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;
  box-shadow:0 2px 12px rgba(201,168,76,.5);}
.ep-item:hover .ep-play-c{opacity:1;}
.ep-info{padding:8px 10px 10px;}
.ep-num{font-size:.68rem;color:#555;margin-bottom:2px;font-family:'Cairo',sans-serif;}
.ep-name{font-size:.8rem;color:#e0e0e0;font-weight:600;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  font-family:'Cairo',sans-serif;line-height:1.35;}

/* cast */
.det-cast{padding:16px 26px 26px;border-top:1px solid rgba(255,255,255,.05);}
.cast-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:4px;}
.cast-row::-webkit-scrollbar{display:none;}
.cast-card{flex-shrink:0;width:72px;text-align:center;}
.cast-card img,.cast-card .cast-ph{width:52px;height:52px;border-radius:50%;object-fit:cover;
  margin:0 auto 6px;display:block;border:2px solid rgba(201,168,76,.2);}
.cast-card .cast-ph{background:#1a1200;display:flex;align-items:center;justify-content:center;}
.cast-card p{font-size:.62rem;color:#777;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cast-card .cast-char{font-size:.58rem;color:#3a3a3a;margin-top:1px;}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(30px);z-index:9999;
  background:#c9a84c;color:#000;padding:9px 22px;border-radius:6px;font-size:.88rem;font-weight:700;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}


/* ── PHONE ── */
@media(max-width:599px){
  :root{--card-min:130px;--row-pad:16px;--hdr-h:56px;}
  #app header{padding:0 16px!important;height:var(--hdr-h)!important;}
  .hero-content{padding:52px 18px 38px!important;}
  .modal-body{padding:10px 12px 14px;}
  .modal-title{font-size:1rem;}
  .det-body{flex-direction:column;}
  .det-poster{width:90px;margin-top:-44px;}
  .det-title{font-size:1.1rem;}
  .det-back-wrap{aspect-ratio:16/7;}
  .row-scroll{padding:0 16px!important;}
  .ep-card-w{width:130px!important;}
}
/* ── TABLET ── */
@media(min-width:600px) and (max-width:1023px){
  :root{--card-min:150px;--row-pad:22px;--hdr-h:62px;}
  #app header{padding:0 22px!important;}
  .hero-content{padding:80px 30px 56px!important;}
  .det-body{flex-direction:row;}
  .det-poster{width:130px;}
  .det-title{font-size:1.35rem;}
  .ep-card-w{width:150px!important;}
  .search-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))!important;}
}
/* ── DESKTOP ── */
@media(min-width:1024px) and (max-width:1599px){
  :root{--card-min:170px;--row-pad:36px;--hdr-h:68px;}
  #app header{padding:0 36px!important;}
  .hero-content{padding:100px 44px 72px!important;}
  .det-poster{width:150px;}
  .det-title{font-size:1.6rem;}
  .ep-card-w{width:180px!important;}
  .search-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))!important;}
  .modal-box{max-width:1100px!important;}
  .det-box{max-width:1000px!important;}
}
/* Focus ring for TV/keyboard navigation */
.ep-card:focus,.det-btn:focus,.season-pill:focus,.ep-item:focus,.det-close:focus,.modal-close:focus,.tv-nav-btn:focus{
  outline:3px solid #c9a84c!important;
  outline-offset:3px;
  border-radius:10px;
  box-shadow:0 0 0 6px rgba(201,168,76,.15)!important;
}
/* ── TV / BIG SCREEN ── */
@media(min-width:1600px){
  :root{--card-min:200px;--row-pad:56px;--hdr-h:80px;}
  body{font-size:18px;}
  #app header{padding:0 56px!important;height:var(--hdr-h)!important;}
  .hero-content{padding:130px 64px 90px!important;}
  .hero-title{font-size:3.2rem!important;}
  .hero-overview{font-size:1.05rem!important;max-width:600px!important;}
  .row-title{font-size:1.2rem!important;}
  .row-scroll{padding:0 56px!important;}
  .ep-card-w{width:220px!important;}
  .ep-card-w .ep-card div[style*="font-size:.88rem"]{font-size:1rem!important;}
  .search-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))!important;}
  .modal-box{max-width:1400px!important;border-radius:20px!important;}
  .det-box{max-width:1200px!important;border-radius:22px!important;}
  .det-poster{width:190px!important;}
  .det-title{font-size:2rem!important;}
  .det-overview{font-size:1rem!important;}
  .det-btn{padding:16px 40px!important;font-size:1.1rem!important;}
  .season-pill{padding:10px 24px!important;font-size:.95rem!important;}
  .ep-item{width:260px!important;}
  /* TV focus ring */
  .tv-focusable:focus{outline:3px solid #c9a84c!important;outline-offset:3px;border-radius:10px;}
  #bnav{display:none!important;}
}
</style>
</head>

// fetchDiscover — by decade or director
async function fetchDiscover({decade, director}){
  let url = '/discover/movie?sort_by=vote_average.desc&vote_count.gte=1000';
  if(decade){
    const yr = parseInt(decade);
    const end = decade==='2020s' ? 2025 : yr+9;
    url += `&primary_release_date.gte=${yr}-01-01&primary_release_date.lte=${end}-12-31`;
  }
  if(director) url += `&with_crew=${director}`;
  const d = await tf(url);
  return (d.results||[]).slice(0,20).map(item=>bldM(item,'',null));
}

async function tf(path){
  const sep=path.includes('?')?'&':'?';
  const r=await fetch(`https://api.themoviedb.org/3${path}${sep}api_key=${TMDB_KEY}&language=en-US`);
  if(!r.ok) throw new Error('TMDB '+r.status);
  return r.json();
}
function bldM(d,imdb,rat){
  return{imdb_id:d.imdb_id||imdb||'',tmdb_id:d.id,
    title:d.title||d.name||'',year:(d.release_date||d.first_air_date||'').slice(0,4),
    rating:rat!=null?String(rat):(d.vote_average?d.vote_average.toFixed(1):''),
    genre:(d.genres||[]).map(g=>g.name).join(', '),overview:d.overview||'',
    poster:d.poster_path?TMDB_IMG+d.poster_path:'',
    backdrop:d.backdrop_path?TMDB_BG+d.backdrop_path:''};
}
async function fetchTop250(){
  const res=[];
  for(let i=0;i<TOP250.length;i++){
    const[tt,tmdb,title,year,r]=TOP250[i];
    if(MCACHE[tmdb]){res.push(MCACHE[tmdb]);continue;}
    try{const d=await tf('/movie/'+tmdb);const o=bldM(d,tt,r);MCACHE[tmdb]=o;res.push(o);}
    catch{res.push({imdb_id:tt,tmdb_id:tmdb,title,year:String(year),rating:String(r),genre:'',overview:'',poster:'',backdrop:''});}
    if(i>0&&i%20===0)await sleep(200);
  }
  return res;
}
async function fetchColl(list){
  const res=[];
  for(const item of list){
    if(MCACHE[item.tmdb]){res.push(MCACHE[item.tmdb]);continue;}
    try{const d=await tf('/movie/'+item.tmdb);const o=bldM(d,item.tt,item.r);MCACHE[item.tmdb]=o;res.push(o);}
    catch{res.push({imdb_id:item.tt,tmdb_id:item.tmdb,title:item.title,year:String(item.year),rating:String(item.r),genre:'',overview:'',poster:'',backdrop:''});}
  }
  return res;
}
async function fetchTopSeries(){

const TV_BLOCKED=new Set([85552]); // Euphoria
async function discover(type,genreId,page){
  const g=genreId?'&with_genres='+genreId:'';
  const d=await tf('/discover/'+type+'?page='+page+g+'&sort_by=popularity.desc&vote_count.gte=200');
  return(d.results||[]).filter(item=>!TV_BLOCKED.has(item.id)).slice(0,20).map(item=>{
    if(type==='tv')return{imdb_id:'',tmdb_id:item.id,title:item.name||item.title,
      year:(item.first_air_date||'').slice(0,4),rating:item.vote_average?item.vote_average.toFixed(1):'',
      genre:'',overview:item.overview||'',
      poster:item.poster_path?TMDB_IMG+item.poster_path:'',
      backdrop:item.backdrop_path?TMDB_BG+item.backdrop_path:'',_kind:'tv'};
    return bldM(item,'',null);
  });
}

window.onSrch=(q)=>{
  clearTimeout(SRCH_T);
  const res=document.getElementById('srch_res');
  if(!res)return;
  if(!q||q.trim().length<2){res.style.display='none';return;}
  res.style.display='block';
  res.innerHTML=`<div style="padding:100px 28px;text-align:center;color:#333;font-family:'Cairo',sans-serif;">جاري البحث…</div>`;
  SRCH_T=setTimeout(()=>doSearch(q.trim()),420);

async function doSearch(q){
  const res=document.getElementById('srch_res');
  if(!res)return;
  try{
    const[mR,tvR]=await Promise.all([
      tf('/search/movie?query='+encodeURIComponent(q)+'&page=1'),
      tf('/search/tv?query='+encodeURIComponent(q)+'&page=1'),
    ]);
    const movies=(mR.results||[]).slice(0,14).map(d=>({...bldM(d,'',null),_kind:'movie',_pop:d.popularity||0}));
    const shows=(tvR.results||[]).slice(0,8).map(d=>({
      imdb_id:'',tmdb_id:d.id,title:d.name||d.title,year:(d.first_air_date||'').slice(0,4),
      rating:d.vote_average?d.vote_average.toFixed(1):'',genre:'',overview:d.overview||'',
      poster:d.poster_path?TMDB_IMG+d.poster_path:'',
      backdrop:d.backdrop_path?TMDB_BG+d.backdrop_path:'',_kind:'tv',_pop:d.popularity||0}));
    const BLOCKED_IDS=new Set([85552]);
    const all=[...movies,...shows]
      .filter(m=>!BLOCKED_IDS.has(m.tmdb_id))
      .sort((a,b)=>(b._pop||0)-(a._pop||0));
    if(!document.getElementById('srch_res'))return;
    document.getElementById('srch_res').innerHTML=`
      <div style="padding:88px 28px 40px;" dir="rtl">
        <h2 style="color:#f0f0f0;margin:0 0 4px;font-family:'Cairo',sans-serif;">${q}</h2>
        <p style="color:#444;font-size:.82rem;margin:0 0 26px;">${all.length} نتيجة</p>
        ${all.length===0?`<div style="text-align:center;padding:60px;color:#333;">لا توجد نتائج</div>`
          :`<div class="search-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;">
              ${all.map(m=>cardHTML(m,{badge:m._kind==='tv'?'TV':'',badgeColor:'#1d4ed8'})).join('')}
            </div>`}
      </div>`;
    attachHovers();
  }catch(e){
    console.error(e);
    if(document.getElementById('srch_res'))
      document.getElementById('srch_res').innerHTML=`<div style="padding:100px 28px;text-align:center;color:#444;">تعذر البحث</div>`;
  }
}

window.showDetails=async function(k){
  const m=getM(k);if(!m)return;
  const detK=k;
  renderDet(m,null,detK);
  document.getElementById('details_modal').classList.add('open');
  document.body.style.overflow='hidden';
  if(!history.state||history.state.modal!=='details')history.pushState({modal:'details'},'');
  try{
    const isTV=m._kind==='tv';
    const[det,cred]=await Promise.all([
      m.tmdb_id?tf('/'+(isTV?'tv':'movie')+'/'+m.tmdb_id):Promise.resolve(null),
      m.tmdb_id?tf('/'+(isTV?'tv':'movie')+'/'+m.tmdb_id+'/credits'):Promise.resolve(null),
    ]);
    if(det){
      if(!m.overview&&det.overview)m.overview=det.overview;
      if(!m.genre&&det.genres)m.genre=det.genres.map(g=>g.name).join(', ');
      if(!m.backdrop&&det.backdrop_path)m.backdrop=TMDB_BG+det.backdrop_path;
      if(!m.poster&&det.poster_path)m.poster=TMDB_IMG+det.poster_path;
      if(det.imdb_id&&!m.imdb_id)m.imdb_id=det.imdb_id;
      if(det.number_of_seasons)m.num_seasons=det.number_of_seasons;
      if(det.seasons){
        window.__TVS[m.tmdb_id]=det.seasons.filter(s=>s.season_number>0)
          .map(s=>({n:s.season_number,count:s.episode_count}));
      }
      if(!isTV&&det.belongs_to_collection)m._coll=det.belongs_to_collection;
    }
    const cast=(cred?.cast||[]).slice(0,14);
    if(document.getElementById('details_modal').classList.contains('open'))
      renderDet(m,cast,detK);
    if(!isTV&&m._coll)loadCollection(m,detK);
  }catch(e){console.error('det fetch',e);}
};

window.loadEps=async function(m,k,sn,pillEl){
  if(!m||!m.tmdb_id)return;
  const epDiv=document.getElementById('ep_'+k);
  if(!epDiv)return;
  if(pillEl){
    document.getElementById('sp_'+k)?.querySelectorAll('.season-pill').forEach(p=>p.classList.remove('active'));
    pillEl.classList.add('active');
  }
  const ck=`${m.tmdb_id}_s${sn}`;
  let eps=window.__EPS[ck];
  if(!eps){
    epDiv.innerHTML=`<div class="ep-grid">${Array(4).fill(0).map(()=>`<div style="flex-shrink:0;width:200px;border-radius:8px;overflow:hidden;background:#1a1a1a;"><div class="sk" style="width:100%;aspect-ratio:16/9;"></div><div style="padding:8px 10px;"><div class="sk" style="height:9px;border-radius:4px;width:65%;margin-bottom:5px;"></div><div class="sk" style="height:8px;border-radius:4px;width:85%;"></div></div></div>`).join('')}</div>`;
    try{
      const d=await tf('/tv/'+m.tmdb_id+'/season/'+sn);
      eps=(d.episodes||[]).filter(e=>e.episode_number>0);
      window.__EPS[ck]=eps;

window.playM=function(m){

    ?(tmdb?`${PLAYER}/tv/${tmdb}/1/1`:`${PLAYER}/tv?imdb=${imdb}&season=1&episode=1`)
    :(tmdb?`${PLAYER}/movie/${tmdb}`:(imdb?`${PLAYER}/movie?imdb=${imdb}`:''));
  const key=imdb||String(tmdb);
  const saved=key?localStorage.getItem('ce_'+key):null;
  if(saved&&parseFloat(saved)>30)src+=(src.includes('?')?'&':'?')+'resumeAt='+saved;

function metaHTML(m){
  const a=[];
  if(m.year)a.push(`<span style="display:flex;align-items:center;gap:4px;color:#555;">${iCal(12)} ${m.year}</span>`);
  if(m.rating)a.push(`<span class="modal-rating" style="display:flex;align-items:center;gap:4px;">${iStar(13)} ${parseFloat(m.rating).toFixed(1)}</span>`);
  if(m.genre)m.genre.split(',').slice(0,3).forEach(g=>a.push(`<span class="modal-gpill">${g.trim()}</span>`));

async function setupTVNav(m,season,episode){
  window.__CTV={m,season,episode,totalSeasons:m.num_seasons||1,epsInSeason:{}};
  document.getElementById('tv_nav').style.display='flex';
  updateTVLbl();updateTVBtns();
  [season,season+1].forEach(async s=>{
    if(s<1)return;
    const ck=`${m.tmdb_id}_s${s}`;
    if(window.__EPS[ck]){if(window.__CTV)window.__CTV.epsInSeason[s]=window.__EPS[ck].length;updateTVBtns();return;}
    try{const d=await tf('/tv/'+m.tmdb_id+'/season/'+s);
      const eps=(d.episodes||[]).filter(e=>e.episode_number>0);
      window.__EPS[ck]=eps;if(window.__CTV)window.__CTV.epsInSeason[s]=eps.length;updateTVBtns();}
    catch{}
  });
}
function updateTVLbl(){
  if(!window.__CTV)return;
  const el=document.getElementById('tv_ep_label');
  if(el)el.textContent=`الموسم ${window.__CTV.season} · الحلقة ${window.__CTV.episode}`;
}
function updateTVBtns(){
  if(!window.__CTV)return;
  const{season,episode,totalSeasons,epsInSeason}=window.__CTV;
  const pb=document.getElementById('tv_prev_btn'),nb=document.getElementById('tv_next_btn');
  if(!pb||!nb)return;
  const epsHere=epsInSeason[season];
  pb.disabled=!(episode>1||season>1);
  nb.disabled=epsHere?(!(episode<epsHere||season<totalSeasons)):(season>=totalSeasons);
}
window.navigateEpisode=async function(dir){
  if(!window.__CTV)return;
  let{m,season,episode,totalSeasons,epsInSeason}=window.__CTV;
  const ck=`${m.tmdb_id}_s${season}`;
  let epsHere=epsInSeason[season];
  if(!epsHere){
    try{const d=await tf('/tv/'+m.tmdb_id+'/season/'+season);
      const eps=(d.episodes||[]).filter(e=>e.episode_number>0);
      window.__EPS[ck]=eps;epsHere=eps.length;window.__CTV.epsInSeason[season]=epsHere;}
    catch{epsHere=episode+1;}
  }
  if(dir===1){
    if(episode<epsHere)episode++;
    else if(season<totalSeasons){season++;episode=1;}else return;
  }else{
    if(episode>1)episode--;
    else if(season>1){
      season--;
      const pck=`${m.tmdb_id}_s${season}`;
      let prev=epsInSeason[season];
      if(!prev){try{const d=await tf('/tv/'+m.tmdb_id+'/season/'+season);
        const eps=(d.episodes||[]).filter(e=>e.episode_number>0);
        window.__EPS[pck]=eps;prev=eps.length;window.__CTV.epsInSeason[season]=prev;}catch{prev=1;}}
      episode=prev;
    }else return;
  }
  window.__CTV.season=season;window.__CTV.episode=episode;
  document.getElementById('player_iframe').src=`${PLAYER}/tv/${m.tmdb_id}/${season}/${episode}`;
  document.getElementById('modal_title').textContent=`${m.title||''} — الموسم ${season}`;
  updateTVLbl();updateTVBtns();
  showToast(`الموسم ${season} · الحلقة ${episode}`);
};

//  PLAYER OVERLAY  (pointer-events:none)
//  Uses window.blur to detect iframe clicks
// ─────────────────────────────────────────
(function(){
  const wrap=document.getElementById('player_wrap');
  const flash=document.getElementById('ply_flash');
  const skipL=document.getElementById('ply_skip_L');
  const skipR=document.getElementById('ply_skip_R');
  let mouseX=0,lastBlur=0;

  function fire(el){el.classList.remove('fire');void el.offsetWidth;el.classList.add('fire');
    setTimeout(()=>el.classList.remove('fire'),750);}

  wrap.addEventListener('mousemove',e=>{
    const r=wrap.getBoundingClientRect();mouseX=e.clientX-r.left;
  });

  window.addEventListener('blur',()=>{
    if(!document.getElementById('modal').classList.contains('open'))return;
    setTimeout(()=>{
      if(document.activeElement!==document.getElementById('player_iframe'))return;
      const now=Date.now(),w=wrap.offsetWidth||1;
      if(now-lastBlur<380){
        if(mouseX<w/2)fire(skipL);else fire(skipR);lastBlur=0;
      }else{fire(flash);lastBlur=now;}
    },30);
  });
})();

let VIDAPI_IDS = null;
async function loadVidCatalog(){
  if(VIDAPI_IDS) return VIDAPI_IDS;
  const key='vidcat_v2', tsKey='vidcat_ts2';
  const ts=parseInt(localStorage.getItem(tsKey)||'0');
  if(Date.now()-ts < 86400000){
    try{const raw=localStorage.getItem(key);if(raw){VIDAPI_IDS=new Set(JSON.parse(raw));return VIDAPI_IDS;}}catch{}
  }
  try{
    // Fetch multiple pages of latest movies + TV from VidAPI catalog
    const pages=await Promise.allSettled(
      [1,2,3,4,5].map(p=>fetch(`https://vidapi.ru/movies/latest/page-${p}.json`).then(r=>r.ok?r.json():null))
    );
    const tvPages=await Promise.allSettled(
      [1,2,3].map(p=>fetch(`https://vidapi.ru/episodes/latest/page-${p}.json`).then(r=>r.ok?r.json():null))
    );
    const ids=new Set();
    [...pages,...tvPages].forEach(r=>{
      if(r.status==='fulfilled'&&r.value){
        (r.value.items||[]).forEach(i=>{ const id=i.tmdb_id||i.show_tmdb_id; if(id)ids.add(String(id)); });
      }
    });
    if(ids.size>100){
      VIDAPI_IDS=ids;
      localStorage.setItem(key,JSON.stringify([...ids]));
      localStorage.setItem(tsKey,String(Date.now()));
    } else {
      VIDAPI_IDS=new Set(); // empty = show everything (fallback)
    }
    return VIDAPI_IDS;
  }catch{VIDAPI_IDS=new Set();return VIDAPI_IDS;}
}
function isAvailable(m){
  if(!VIDAPI_IDS||VIDAPI_IDS.size===0)return true;
  return VIDAPI_IDS.has(String(m.tmdb_id));
}

(function initTVRemote(){
  // Make all cards keyboard/tab focusable
  function makeCardsFocusable(){
    document.querySelectorAll('.ep-card').forEach(card=>{
      if(!card.getAttribute('tabindex')) card.setAttribute('tabindex','0');
      card.addEventListener('keydown', e=>{
        if(e.key==='Enter'||e.key===' '){e.preventDefault();card.click();}
        if(e.key==='ArrowRight'){e.preventDefault();
          const wrap=card.closest('.ep-card-w');
          const next=wrap&&wrap.nextElementSibling&&wrap.nextElementSibling.querySelector('.ep-card');
          if(next){next.focus();next.scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});}
        }
        if(e.key==='ArrowLeft'){e.preventDefault();
          const wrap=card.closest('.ep-card-w');
          const prev=wrap&&wrap.previousElementSibling&&wrap.previousElementSibling.querySelector('.ep-card');
          if(prev){prev.focus();prev.scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});}
        }
        if(e.key==='ArrowDown'){e.preventDefault();
          const row=card.closest('[id^="row_"],[id^="rm_"],[id^="rt_"]');
          const section=row&&row.closest('section');
          const nextSection=section&&section.nextElementSibling;
          const nextRow=nextSection&&nextSection.querySelector('[id^="row_"],[id^="rm_"],[id^="rt_"]');
          const first=nextRow&&nextRow.querySelector('.ep-card');
          if(first){first.focus();first.scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});}
        }
        if(e.key==='ArrowUp'){e.preventDefault();
          const row=card.closest('[id^="row_"],[id^="rm_"],[id^="rt_"]');
          const section=row&&row.closest('section');
          const prevSection=section&&section.previousElementSibling;
          const prevRow=prevSection&&prevSection.querySelector('[id^="row_"],[id^="rm_"],[id^="rt_"]');
          const first=prevRow&&prevRow.querySelector('.ep-card');
          if(first){first.focus();first.scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});}
        }
      });
    });
    // Make buttons focusable too
    document.querySelectorAll('.det-btn,.season-pill,.ep-item,.det-close,.modal-close,.tv-nav-btn').forEach(btn=>{
      if(!btn.getAttribute('tabindex')) btn.setAttribute('tabindex','0');
    });
  }

  // Run on load and after each page render
  const origFillRow = window.fillRow;
  // Observe DOM changes to make new cards focusable
  const obs = new MutationObserver(()=>makeCardsFocusable());
  obs.observe(document.getElementById('app')||document.body,{childList:true,subtree:true});
  makeCardsFocusable();

  // Global keyboard shortcuts
  document.addEventListener('keydown', e=>{
    const detOpen = document.getElementById('details_modal')?.classList.contains('open');
    const plyOpen = document.getElementById('modal')?.classList.contains('open');
    if(e.key==='Escape'||e.key==='Backspace'){
      if(plyOpen){e.preventDefault();closeModal();}
      else if(detOpen){e.preventDefault();closeDet();}
    }
    if(e.key==='MediaTrackNext') navigateEpisode(1);
    if(e.key==='MediaTrackPrevious') navigateEpisode(-1);
  });

  window.addEventListener('popstate',()=>setTimeout(makeCardsFocusable,300));
})();

async function openBook(b){
  // Get download link via our function
  try{
    const r=await fetch('https://annas-archive-api.p.rapidapi.com/downloadBook?md5='+b.md5,{
      headers:{
        'X-RapidAPI-Key':'6063f46b64msh60311f8db150077p1a9e1djsn408e2c59887f',
        'X-RapidAPI-Host':'annas-archive-api.p.rapidapi.com'
      }
    });
    const d=await r.json();
    // d is array of download URLs
    const links=Array.isArray(d)?d:(d.links||d.downloadLinks||[]);
    const url=links[0]||'';
    if(!url){showToast('تعذر الحصول على رابط التحميل');return;}
    // Open PDF viewer
    const modal=document.getElementById('pdf_modal');
    const iframe=document.getElementById('pdf_iframe');
    const title=document.getElementById('pdf_title');
    const dlBtn=document.getElementById('pdf_download');
    if(!modal||!iframe)return;
    // Use proxy for PDF, direct for epub
    if(title)title.textContent=b.title||'';
    if(dlBtn){dlBtn.href=url;dlBtn.setAttribute('download',b.title||'book');}
    // Use PDF.js for PDF, direct for epub
    if(b.format==='pdf'){
      iframe.src='https://mozilla.github.io/pdf.js/web/viewer.html?file='+encodeURIComponent(url);
    } else {
      iframe.src=url;
    }
    modal.style.display='flex';
    document.body.style.overflow='hidden';
    history.pushState({modal:'pdf'},'');
  }catch(e){
    showToast('خطأ في تحميل الكتاب');
    console.error(e);
  }
}
